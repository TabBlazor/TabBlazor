name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  NETCORE_VERSION: '10.0.x'
  PUBLISH_DIR: docs/Tabler.Docs.Wasm/bin/Release/net10.0/publish/wwwroot

jobs:
  build:
    name: Build, test and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.NETCORE_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.NETCORE_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache .NET workloads
        uses: actions/cache@v4
        with:
          path: |
            /usr/share/dotnet/sdk-manifests
            /usr/share/dotnet/packs
            /usr/share/dotnet/metadata
            /usr/share/dotnet/library-packs
            /usr/share/dotnet/template-packs
          key: ${{ runner.os }}-workloads-${{ hashFiles('global.json') }}-${{ env.NETCORE_VERSION }}
          restore-keys: ${{ runner.os }}-workloads-

      - name: Restore Workloads
        run: sudo dotnet workload restore

      - name: Restore Packages
        run: dotnet restore

      - name: Build Solution
        run: dotnet build TabBlazor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --configuration Release --no-restore --verbosity normal

      - name: Publish WASM docs
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: dotnet publish Tabler.Docs.Wasm.csproj --configuration Release --no-build
        working-directory: ./docs/Tabler.Docs.Wasm

      - name: Deploy to GitHub Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: peaceiris/actions-gh-pages@v3.6.1
        with:
          github_token: ${{ secrets.PUBLISH_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ env.PUBLISH_DIR }}
          allow_empty_commit: false
          keep_files: false
          force_orphan: true
