name: Create Release

on: workflow_dispatch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Get version
        id: nbgv
        uses: dotnet/nbgv@master

      - name: Test
        run: dotnet test TabBlazor.Tests/TabBlazor.Tests.csproj -c Release

      - name: Pack libraries
        run: |
          dotnet pack src/TabBlazor/TabBlazor.csproj -c Release -o artifacts
          dotnet pack src/TabBlazor.QuickTable.EntityFramework/TabBlazor.QuickTable.EntityFramework.csproj -c Release -o artifacts

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.nbgv.outputs.SemVer2 }}
          name: Release ${{ steps.nbgv.outputs.SemVer2 }}
          prerelease: ${{ !startsWith(github.ref_name, 'release/') }}
          files: artifacts/*.nupkg
